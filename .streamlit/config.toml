# Streamlit configuration. Keep this minimal — most settings are
# overridden by env vars or CLI flags in production deployments.
[browser]
gatherUsageStats = false

[client]
# Public deployments should not show local developer toolbar items such as
# deploy, rerun, or clear-cache controls.
toolbarMode = "minimal"
# Keep detailed tracebacks in server logs instead of the browser surface.
showErrorDetails = "type"

[theme]
base = "dark"
primaryColor = "#6FB1FF"
backgroundColor = "#07101F"
secondaryBackgroundColor = "#0E1B2E"
textColor = "#E6EDF7"
font = "sans serif"

[server]
# Headless is also forced by the Dockerfile's STREAMLIT_SERVER_HEADLESS env.
headless = false
runOnSave = false
# Keep XSRF protection on. Streamlit forces CORS=true when XSRF is enabled,
# so we don't set enableCORS here (avoids a startup compatibility warning).
enableXsrfProtection = true
