name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m py_compile \
            dashboard.py maritime_data.py config.py providers.py \
            indicators.py signals.py backtest.py demo_data.py \
            route_economics.py launcher.py \
            scripts/smoke_test.py scripts/doctor.py scripts/security_check.py \
            SharepricemovementMaritime.py

      - name: pip check
        run: pip check

      - name: Security check (static secret scan)
        run: python scripts/security_check.py

      - name: Run tests (offline only)
        env:
          APP_MODE: demo
        run: pytest -q

      - name: Demo-mode smoke test (no live providers)
        env:
          APP_MODE: demo
        run: python scripts/smoke_test.py
